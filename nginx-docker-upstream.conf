# Configuration Nginx pour faire reverse proxy vers PHP-FPM du Docker
# Copier ce fichier dans /etc/nginx/sites-available/ et créer un symlink dans sites-enabled/

upstream laravel_app {
    server 127.0.0.1:9000;
}

server {
    listen 80;
    server_name app.miseauvert.fr localhost;

    root /var/www/public;
    index index.php index.html;

    # ==================== API Laravel ====================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM vers Docker
    location ~ \.php$ {
        fastcgi_pass laravel_app;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    # Deny access to hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ==================== phpMyAdmin Reverse Proxy ====================
    location /phpmyadmin/ {
        proxy_pass http://127.0.0.1:80/phpmyadmin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /phpmyadmin {
        return 301 /phpmyadmin/;
    }

    # Logs
    access_log /var/log/nginx/laravel_app_access.log;
    error_log /var/log/nginx/laravel_app_error.log;
}
