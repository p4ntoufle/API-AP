# Configuration Nginx pour faire reverse proxy vers Docker
# Mettre à jour /etc/nginx/sites-available/miseauvert-routing

# ==================== LARAVEL - miseauvert.fr ====================
server {
    listen 80;
    server_name miseauvert.fr;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }
}

# ==================== GLPI - glpi.miseauvert.fr ====================
server {
    listen 80;
    server_name glpi.miseauvert.fr;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }
}
