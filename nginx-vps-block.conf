upstream laravel_app {
    server 127.0.0.1:9000;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.miseauvert.fr;

    # ==================== API Laravel ====================
    location / {
        proxy_pass http://laravel_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ==================== phpMyAdmin Reverse Proxy ====================
    location /phpmyadmin/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Permettre les redirects internes
        proxy_redirect http://127.0.0.1:8081/ /phpmyadmin/;
        
        # Configuration pour les cookies
        proxy_cookie_path / /phpmyadmin/;
        proxy_cookie_flags ~ secure httponly samesite=lax;
    }

    # Alias pour /phpmyadmin sans trailing slash
    location = /phpmyadmin {
        return 301 /phpmyadmin/;
    }

    # Deny access to hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Logs
    access_log /var/log/nginx/app.miseauvert.fr.access.log;
    error_log /var/log/nginx/app.miseauvert.fr.error.log;
}
