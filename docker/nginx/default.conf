server {
    listen 80;
    server_name app.miseauvert.fr;

    # ==================== API Laravel ====================
    root /var/www/html/public;
    index index.php index.html;

    # Route racine - API Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM pour l'API
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ==================== phpMyAdmin Reverse Proxy ====================
    location /phpmyadmin/ {
        proxy_pass http://phpmyadmin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # Permettre les redirects internes
        proxy_redirect http://phpmyadmin/ /phpmyadmin/;
        
        # Configuration pour les cookies
        proxy_cookie_path / /phpmyadmin/;
        proxy_cookie_flags ~ secure httponly samesite=lax;
    }

    # Alias pour /phpmyadmin sans trailing slash
    location = /phpmyadmin {
        return 301 /phpmyadmin/;
    }
}

