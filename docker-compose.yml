name: miseauvert
services:
  db:
    image: mariadb:11.4
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: MiseAuVert
      MYSQL_USER: miseauvert
      MYSQL_PASSWORD: miseauvert
      MARIADB_AUTO_UPGRADE: 1
      MARIADB_DISABLE_UPGRADE_BACKUP: 1
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - infra_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    environment:
      APP_NAME: MiseAuVert
      APP_ENV: development
      APP_DEBUG: 'true'
      APP_URL: http://app.miseauvert.fr
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: MiseAuVert
      DB_USERNAME: miseauvert
      DB_PASSWORD: miseauvert
    volumes:
      - .:/var/www:cached
      - /var/www/vendor
      - /var/www/node_modules
      - /var/www/bootstrap/cache
      - /var/www/storage
    networks:
      - infra_net
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - infra_net
    depends_on:
      - app

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: miseauvert
      PMA_PASSWORD: miseauvert
      PMA_ROOT_PASSWORD: root
      UPLOAD_LIMIT: 128M
    networks:
      - infra_net
    depends_on:
      db:
        condition: service_healthy

networks:
  infra_net:
    driver: bridge

volumes:
  db_data: