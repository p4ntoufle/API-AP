services:
  app:
    build: .
    container_name: laravel_app
    ports:
      - '9000:9000'
    volumes:
      - .:/var/www/html
    networks:
      - infra_net
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    ports:
      - '80:80'
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - infra_net
    depends_on:
      - app
      - phpmyadmin

  db:
    image: mariadb
    container_name: mysql_db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: MiseAuVert
      MYSQL_USER: miseauvert
      MYSQL_PASSWORD: miseauvert
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - infra_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - '8081:80'
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    networks:
      - infra_net
    depends_on:
      - db

networks:
  infra_net:

volumes:
  db_data:
  glpi_data:
